<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dawa Duniya • Dashboard</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- Animate CSS -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />

  <!-- AUTH CHECK -->
  <script>
    (() => {
      const token = localStorage.getItem("dawaToken");

      if (!token) {
        window.location.replace("/");
      }
    })();
  </script>

  <style>

    :root{
      --primary:#00e5a8;
      --secondary:#00c2ff;
      --dark:#050816;
      --glass:rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.12);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      min-height:100vh;
      overflow:hidden;
      background:#050816;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      position:relative;
    }

    /* BACKGROUND */

    .bg{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:-5;

      background:
      radial-gradient(circle at top left,#10203a 0%,transparent 30%),
      radial-gradient(circle at bottom right,#0c2e2f 0%,transparent 35%),
      #050816;
    }

    .grid{
      position:absolute;
      width:200%;
      height:200%;

      background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

      background-size:60px 60px;

      transform:rotate(12deg);

      animation:gridMove 20s linear infinite;
    }

    @keyframes gridMove{
      from{
        transform:translateY(0) rotate(12deg);
      }
      to{
        transform:translateY(-60px) rotate(12deg);
      }
    }

    /* GLOWS */

    .glow{
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:0.5;

      animation:float 8s ease-in-out infinite alternate;
    }

    .g1{
      width:400px;
      height:400px;
      background:#00e5a8;
      top:-100px;
      left:-100px;
    }

    .g2{
      width:450px;
      height:450px;
      background:#00c2ff;
      right:-100px;
      bottom:-100px;
      animation-delay:2s;
    }

    .g3{
      width:250px;
      height:250px;
      background:#8b5cf6;
      top:40%;
      left:45%;
      animation-delay:1s;
    }

    @keyframes float{
      from{
        transform:translateY(-20px) translateX(-20px);
      }
      to{
        transform:translateY(30px) translateX(30px);
      }
    }

    /* PARTICLES */

    .particle{
      position:absolute;
      width:4px;
      height:4px;
      background:white;
      border-radius:50%;
      opacity:0.4;

      animation:particle 12s linear infinite;
    }

    @keyframes particle{
      from{
        transform:translateY(100vh) scale(0);
      }
      to{
        transform:translateY(-100vh) scale(1.5);
      }
    }

    /* CARD */

    .card{
      width:430px;
      max-width:92%;

      position:relative;

      padding:45px 35px;

      border-radius:35px;

      background:var(--glass);

      border:1px solid var(--border);

      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);

      box-shadow:
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 1px 1px rgba(255,255,255,0.08);

      text-align:center;

      overflow:hidden;

      animation:cardEntry 1.1s ease;
    }

    @keyframes cardEntry{
      from{
        opacity:0;
        transform:translateY(60px) scale(0.9);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .card::before{
      content:'';

      position:absolute;

      width:180%;
      height:180%;

      background:conic-gradient(
      from 0deg,
      transparent,
      rgba(0,229,168,0.4),
      transparent,
      rgba(0,194,255,0.4),
      transparent
      );

      animation:rotate 6s linear infinite;

      top:-40%;
      left:-40%;

      z-index:-2;
    }

    .card::after{
      content:'';

      position:absolute;
      inset:2px;

      border-radius:35px;

      background:rgba(5,8,22,0.88);

      z-index:-1;
    }

    @keyframes rotate{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    /* LOGO */

    .logo-wrap{
      position:relative;

      width:130px;
      height:130px;

      margin:0 auto 20px;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .logo-ring{
      position:absolute;

      width:100%;
      height:100%;

      border-radius:50%;

      border:2px solid rgba(255,255,255,0.15);

      animation:spin 12s linear infinite;
    }

    .logo-ring:nth-child(2){
      width:85%;
      height:85%;

      border-top:2px solid var(--primary);
      border-bottom:2px solid var(--secondary);

      animation-direction:reverse;
      animation-duration:8s;
    }

    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    .logo{
      width:78px;
      height:78px;

      border-radius:24px;

      background:linear-gradient(
      135deg,
      var(--primary),
      var(--secondary)
      );

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:34px;
      font-weight:800;

      color:#04111d;

      box-shadow:
      0 0 30px rgba(0,229,168,0.45),
      0 0 60px rgba(0,194,255,0.25);

      animation:pulse 3s infinite;
    }

    @keyframes pulse{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.08); }
      100%{ transform:scale(1); }
    }

    h1{
      font-size:38px;
      font-weight:800;

      margin-bottom:12px;

      background:
      linear-gradient(to right,#ffffff,#00e5a8,#00c2ff);

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p{
      color:#9aa7bd;

      font-size:15px;
      line-height:1.7;

      margin-bottom:35px;
    }

    /* STATUS */

    .status{
      display:flex;
      justify-content:center;
      gap:10px;

      margin-bottom:30px;
    }

    .dot{
      width:10px;
      height:10px;

      border-radius:50%;

      background:var(--primary);

      animation:blink 1.5s infinite;
    }

    .dot:nth-child(2){
      animation-delay:0.3s;
    }

    .dot:nth-child(3){
      animation-delay:0.6s;
    }

    @keyframes blink{
      0%,100%{
        opacity:0.3;
        transform:scale(1);
      }

      50%{
        opacity:1;
        transform:scale(1.5);
      }
    }

    /* BUTTON */

    .logout-btn{
      width:100%;

      padding:17px;

      border:none;
      border-radius:18px;

      background:
      linear-gradient(135deg,#ff4d6d,#ff6b81);

      color:white;

      font-size:16px;
      font-weight:700;

      cursor:pointer;

      transition:0.4s;
    }

    .logout-btn:hover{
      transform:translateY(-3px);
    }

    @media(max-width:500px){

      .card{
        padding:35px 24px;
      }

      h1{
        font-size:30px;
      }

    }

  </style>
</head>

<body>

  <!-- BG -->
  <div class="bg">

    <div class="grid"></div>

    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>

  </div>

  <!-- CARD -->
  <div class="card animate__animated animate__fadeInUp">

    <div class="logo-wrap">

      <div class="logo-ring"></div>
      <div class="logo-ring"></div>

      <div class="logo">
        💊
      </div>

    </div>

    <h1>Dawa Duniya</h1>

    <div class="status">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <p>
      Authentication successful.<br>
      Welcome to Dawa Duniya 🚀
    </p>

    <button class="logout-btn" onclick="logout()">
      Sign Out
    </button>

  </div>

  <script>

    // PARTICLES
    for(let i=0;i<40;i++){

      const p = document.createElement("div");

      p.className = "particle";

      p.style.left = Math.random() * 100 + "vw";

      p.style.animationDuration =
      (8 + Math.random() * 10) + "s";

      p.style.animationDelay =
      Math.random() * 5 + "s";

      document.body.appendChild(p);
    }

    // LOGOUT
    function logout(){

      const card = document.querySelector(".card");

      card.classList.remove("animate__fadeInUp");

      card.classList.add(
        "animate__animated",
        "animate__zoomOutDown"
      );

      setTimeout(() => {

        localStorage.removeItem("dawaToken");

        window.location.replace("/");

      }, 700);
    }

  </script>

</body>
</html>
