<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dawa Duniya Dashboard</title>

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <script>
        // ==============================
        // AUTH CHECK BEFORE PAGE LOAD
        // ==============================
        (function () {
            const token = localStorage.getItem("dawaToken");

            // Agar token nahi hai toh login page
            if (!token) {
                window.location.href = "./index.html";
            } else {
                // Token hai toh page dikhao
                document.documentElement.style.visibility = "visible";
            }
        })();
    </script>

    <style>
        :root {
            --primary: #00a884;
            --primary-dark: #008f70;
            --bg: #f0f4f8;
            --text: #1e293b;
            --danger: #ff4b2b;
            --danger-dark: #e63e20;
        }

        /* Page hide until auth check */
        html {
            visibility: hidden;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #e6f7f3, #f5f9fc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: #fff;
            padding: 40px 30px;
            border-radius: 22px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            animation: fadeIn 0.5s ease;
        }

        .logo {
            font-size: 55px;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--primary);
            font-size: 32px;
            margin-bottom: 12px;
        }

        p {
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
        }

        .user-box {
            margin-top: 25px;
            background: #f8fafc;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
        }

        .token-status {
            color: var(--primary-dark);
            font-weight: 600;
            margin-top: 8px;
        }

        .logout-btn {
            margin-top: 28px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--danger);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger-dark);
            transform: translateY(-2px);
        }

        .logout-btn:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 500px) {
            .container {
                padding: 30px 22px;
            }

            h1 {
                font-size: 26px;
            }

            p {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">🏥</div>

        <h1>Welcome to Dawa Duniya</h1>

        <p>
            Aap successfully login ho chuke hain.
            Dashboard access granted.
        </p>

        <div class="user-box">
            <p><strong>Authentication Status</strong></p>
            <p class="token-status">✔ Secure Session Active</p>
        </div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

    <script>
        // ==============================
        // LOGOUT FUNCTION
        // ==============================
        function logout() {

            // Token remove
            localStorage.removeItem("dawaToken");

            // Redirect to login
            window.location.href = "./index.html";
        }

        // ==============================
        // EXTRA SECURITY
        // Browser back button se protect
        // ==============================
        window.history.pushState(null, null, window.location.href);

        window.onpopstate = function () {
            window.history.go(1);
        };
    </script>

</body>
</html>
