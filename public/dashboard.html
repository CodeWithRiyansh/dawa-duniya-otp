<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Dawa Duniya Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
color:white;
overflow:hidden;
}

.card{
width:420px;
padding:45px 35px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.12);
text-align:center;
}

.logo{
width:90px;
height:90px;
margin:auto;
margin-bottom:20px;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
background:linear-gradient(135deg,#00e5a8,#00c2ff);
}

h1{
font-size:36px;
margin-bottom:10px;
}

p{
color:#94a3b8;
line-height:1.7;
margin-bottom:30px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#ff4d6d,#ff6b81);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

</style>

<script>

(() => {

  try {

    const token =
      localStorage.getItem("dawaToken");

    // TOKEN NOT FOUND
    if (!token) {

      window.location.replace("/");

      return;
    }

    // JWT FORMAT BASIC CHECK
    const parts = token.split(".");

    if (parts.length !== 3) {

      localStorage.removeItem("dawaToken");

      window.location.replace("/");

      return;
    }

    // JWT PAYLOAD CHECK
    const payload = JSON.parse(
      atob(parts[1])
    );

    // EXPIRED TOKEN
    if (payload.exp * 1000 < Date.now()) {

      localStorage.removeItem("dawaToken");

      window.location.replace("/");

      return;
    }

  } catch (err) {

    console.log("AUTH ERROR:", err);

    localStorage.removeItem("dawaToken");

    window.location.replace("/");
  }

})();

</script>

</body>
</html>
