<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Dawa Duniya</title>
    
    <script>
        // --- 1. SABSE PEHLE SECURITY CHECK ---
        // Ye script page load hone se pehle hi user ko bhaga degi agar token nahi hai
        (function() {
            const token = localStorage.getItem('dawaToken');
            if (!token) {
                // Bina alert ke turant redirect karna professional hota hai
                window.location.replace('/index.html'); 
            }
        })();
    </script>

    <style>
        :root { --primary: #00a884; --bg: #f0f4f8; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            /* Default hidden taaki bina login ke jhalak bhi na dikhe */
            visibility: hidden; 
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: var(--primary); }
        .logout-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff4b2b;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover { background: #e63e20; transform: scale(1.05); }
    </script>
</head>
<body>

    <div class="container">
        <h1>Welcome to Dawa Duniya! 🏥</h1>
        <p>Aapka authentication successful raha.</p>
        
        <button class="logout-btn" onclick="logout()">
            Logout Karein
        </button>
    </div>

    <script>
        // --- 2. AGAR TOKEN HAI TOH CONTENT DIKHAO ---
        window.onload = function() {
            if (localStorage.getItem('dawaToken')) {
                document.body.style.visibility = 'visible';
            }
        };

        function logout() {
            // Token saaf karo
            localStorage.removeItem('dawaToken');
            // Login page par wapas bhejo
            window.location.replace('/index.html');
        }
    </script>
</body>
</html>
