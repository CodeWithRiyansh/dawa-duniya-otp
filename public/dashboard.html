<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Dashboard | Dawa Duniya
    </title>

    <style>

        body {

            margin: 0;

            font-family: Arial, sans-serif;

            background: #f4f7fb;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

            visibility: hidden;
        }

        .card {

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow:
                0 10px 25px rgba(0,0,0,0.1);

            text-align: center;

            width: 350px;
        }

        h1 {

            color: #00a884;
        }

        button {

            margin-top: 20px;

            padding: 12px 20px;

            border: none;

            border-radius: 10px;

            background: #ff4d4f;

            color: white;

            font-size: 15px;

            cursor: pointer;
        }

        button:hover {

            opacity: 0.9;
        }

    </style>

    <script>

        // ===========================
        // AUTH CHECK
        // ===========================
        (() => {

            const token =
                localStorage.getItem(
                    "dawaToken"
                );

            if (!token) {

                window.location.replace(
                    "/"
                );
            }

        })();

    </script>

</head>

<body>

<div class="card">

    <h1>
        Welcome To Dawa Duniya 🚀
    </h1>

    <p>
        Authentication Successful
    </p>

    <button onclick="logout()">
        Logout
    </button>

</div>

<script>

    // ===========================
    // SHOW PAGE AFTER AUTH
    // ===========================
    window.onload = () => {

        document.body.style.visibility =
            "visible";
    };

    // ===========================
    // LOGOUT
    // ===========================
    function logout() {

        localStorage.removeItem(
            "dawaToken"
        );

        window.location.replace("/");
    }

</script>

</body>
</html>
