<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Dawa Duniya Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050816;
color:white;
overflow:hidden;
}

.card{
width:420px;
padding:45px 35px;
border-radius:30px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.12);
text-align:center;
}

.logo{
width:90px;
height:90px;
margin:auto;
margin-bottom:20px;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
background:linear-gradient(135deg,#00e5a8,#00c2ff);
}

h1{
font-size:36px;
margin-bottom:10px;
}

p{
color:#94a3b8;
line-height:1.7;
margin-bottom:30px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#ff4d6d,#ff6b81);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

</style>

<script>

const token=
localStorage.getItem("dawaToken");

if(!token){
window.location.href="/";
}

</script>

</head>

<body>

<div class="card">

<div class="logo">
💊
</div>

<h1>Dawa Duniya</h1>

<p>
Authentication successful 🚀
<br>
Welcome to dashboard
</p>

<button onclick="logout()">
Sign Out
</button>

</div>

<script>

function logout(){

localStorage.removeItem("dawaToken");

window.location.href="/";

}

</script>

</body>
</html>
