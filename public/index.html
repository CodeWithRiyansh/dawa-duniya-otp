<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawa Duniya | Secure Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
body {
    font-family: Poppins, sans-serif;
    background: linear-gradient(135deg, #e6f7f4, #f0f4f8);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 380px;
    background: #fff;
    padding: 30px;
    border-radius: 22px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.05);
}

/* BRAND */
h2 {
    color: #00a884;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.2s;
}

input:focus {
    border-color: #00a884;
    box-shadow: 0 0 8px rgba(0,168,132,0.2);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    transition: 0.25s;
}

#sendBtn {
    background: linear-gradient(135deg, #00a884, #00d2a0);
}

#verifyBtn {
    background: linear-gradient(135deg, #007bff, #0056b3);
}

button:hover {
    transform: translateY(-2px);
    opacity: 0.95;
}

/* HIDE */
.hidden { display: none; }

/* MESSAGE */
#msg {
    margin-top: 18px;
    min-height: 20px;
    font-size: 14px;
}

/* MOBILE */
@media (max-width: 420px) {
    .card {
        width: 92%;
    }
}
</style>
</head>

<body>

<div class="card">

    <!-- BRAND -->
    <h2>Dawa Duniya</h2>
    <div class="subtitle">Aapki sehat ka sathi ❤️</div>

    <!-- EMAIL -->
    <div id="emailSection">
        <input type="email" id="email" placeholder="Enter Email"/>
        <button id="sendBtn">Send OTP</button>
    </div>

    <!-- OTP -->
    <div id="otpSection" class="hidden">
        <input type="text" id="otp" placeholder="Enter OTP"/>
        <button id="verifyBtn">Verify & Login</button>
    </div>

    <p id="msg"></p>
</div>

<!-- SCRIPT -->
<script>
const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://dawa-duniya-otp.vercel.app";

let tempVToken = "";

/* ================= SEND OTP ================= */
async function handleSendOTP() {
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");

    if (!email) {
        msg.innerText = "❌ Email required";
        msg.style.color = "red";
        return;
    }

    msg.innerText = "Sending OTP...";
    msg.style.color = "blue";

    try {
        const res = await fetch(`${API_URL}/send-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.success) {
            tempVToken = data.vToken;

            document.getElementById("emailSection").classList.add("hidden");
            document.getElementById("otpSection").classList.remove("hidden");

            msg.innerText = "✅ OTP sent successfully!";
            msg.style.color = "green";
        } else {
            msg.innerText = "❌ " + data.message;
            msg.style.color = "red";
        }
    } catch (err) {
        msg.innerText = "❌ Server error";
        msg.style.color = "red";
    }
}

/* ================= VERIFY OTP ================= */
window.handleVerifyOTP = async function () {
    const otp = document.getElementById("otp").value.trim();
    const msg = document.getElementById("msg");

    if (!otp) {
        msg.innerText = "❌ OTP required";
        msg.style.color = "red";
        return;
    }

    msg.innerText = "Verifying...";
    msg.style.color = "blue";

    try {
        const res = await fetch(`${API_URL}/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                userOtp: otp,
                vToken: tempVToken
            })
        });

        const data = await res.json();

        if (data.success) {
            localStorage.setItem("dawaToken", data.token);

            msg.innerText = "✅ Login Successful";
            msg.style.color = "green";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 800);

        } else {
            msg.innerText = "❌ " + data.message;
            msg.style.color = "red";
        }
    } catch (err) {
        msg.innerText = "❌ Server error";
        msg.style.color = "red";
    }
};

/* EVENTS */
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("sendBtn").addEventListener("click", handleSendOTP);
    document.getElementById("verifyBtn").addEventListener("click", window.handleVerifyOTP);
});
</script>

</body>
</html>
