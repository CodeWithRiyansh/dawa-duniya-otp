<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawa Duniya | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a884; --secondary: #007bff; --bg: #f0f4f8; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 380px; transition: all 0.5s ease; border: 1px solid rgba(255,255,255,0.5); text-align: center; }
        
        h2 { color: var(--primary); font-weight: 600; margin-bottom: 8px; margin-top: 0; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 168, 132, 0.2); }

        button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #00d2a0); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 168, 132, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 168, 132, 0.4); }
        
        .hidden { display: none; }
        .visible { display: block; animation: fadeIn 0.5s forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #msg { margin-top: 20px; font-size: 13px; font-weight: 500; line-height: 1.4; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dawa Duniya</h2>
    <p id="subtext">Aapki sehat, humari zimmedari.</p>

    <div id="emailSection">
        <div class="input-group">
            <input type="email" id="email" placeholder="Apna Email Daalein" required>
        </div>
        <button id="sendBtn" onclick="handleSendOTP()">
            <span id="btnLoader" class="loader"></span>
            <span id="btnText">OTP Bhejein</span>
        </button>
    </div>

    <div id="otpSection" class="hidden">
        <div class="input-group">
            <input type="text" id="otp" placeholder="6-digit OTP Daalein" maxlength="6">
        </div>
        <button onclick="handleVerifyOTP()" style="background: linear-gradient(135deg, var(--secondary), #0056b3);">
            Verify & Login
        </button>
    </div>

    <p id="msg"></p>
</div>

<script>
    async function handleSendOTP() {
        const email = document.getElementById('email').value;
        const msg = document.getElementById('msg');
        const btnLoader = document.getElementById('btnLoader');
        const btnText = document.getElementById('btnText');

        if(!email) {
            msg.style.color = "red";
            msg.innerText = "❌ Bhai email toh daalo!";
            return;
        }

        btnLoader.style.display = 'block';
        btnText.style.display = 'none';
        msg.innerText = "";

        try {
            const res = await fetch('/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (data.success) {
                // IMPORTANT: Vercel ke liye token save kar rahe hain
                localStorage.setItem('tempVToken', data.vToken);
                
                document.getElementById('emailSection').classList.add('hidden');
                document.getElementById('otpSection').classList.remove('hidden');
                document.getElementById('otpSection').classList.add('visible');
                
                msg.style.color = "green";
                msg.innerHTML = `✅ OTP aapki email <b>${email}</b> par bhej diya gaya hai.`;
            } else {
                msg.style.color = "red";
                msg.innerText = "❌ " + data.message;
            }
        } catch (e) {
            msg.style.color = "red";
            msg.innerText = "❌ Connection Error! Check terminal.";
        } finally {
            btnLoader.style.display = 'none';
            btnText.style.display = 'block';
        }
    }

    async function handleVerifyOTP() {
        const userOtp = document.getElementById('otp').value;
        const vToken = localStorage.getItem('tempVToken'); // Token uthao
        const msg = document.getElementById('msg');

        if(!userOtp) {
            msg.style.color = "red";
            msg.innerText = "❌ OTP likhna bhool gaye!";
            return;
        }

        try {
            const res = await fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userOtp: userOtp, 
                    vToken: vToken  // Memory ki jagah token bhej rahe hain
                })
            });

            const data = await res.json();

            if (data.success) {
                localStorage.removeItem('tempVToken'); // Kaam ho gaya toh hata do
                localStorage.setItem('dawaToken', data.token); // Final Login Token

                msg.style.color = "green";
                msg.innerText = "✅ Sahi hai! Dashboard par le ja raha hoon...";

                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);
            } else {
                msg.style.color = "red";
                msg.innerText = "❌ " + data.message;
            }
        } catch (e) {
            msg.style.color = "red";
            msg.innerText = "❌ Verification failed. Refresh karke try karein.";
        }
    }
</script>

</body>
</html>
