<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawa Duniya | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a884; --secondary: #007bff; --bg: #f0f4f8; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Glassmorphism Card */
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 380px; transition: all 0.5s ease; border: 1px solid rgba(255,255,255,0.5); }
        
        h2 { color: var(--primary); font-weight: 600; margin-bottom: 8px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 168, 132, 0.2); }

        button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #00d2a0); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 168, 132, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 168, 132, 0.4); }
        button:active { transform: scale(0.98); }

        /* Smooth Transition Classes */
        .fade-out { opacity: 0; transform: translateX(-20px); pointer-events: none; }
        .hidden { display: none; }
        .visible { display: block; animation: fadeIn 0.5s forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Status message styling */
        #msg { margin-top: 20px; font-size: 13px; font-weight: 500; line-height: 1.4; transition: 0.3s; }
    </style>
</head>
<body>

<div class="card" id="loginCard">
    <h2>Dawa Duniya</h2>
    <p id="subtext">Aapki sehat, humari zimmedari.</p>

    <div id="emailSection">
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>
        <button onclick="handleSendOTP()">
            <span id="btnLoader" class="loader"></span>
            <span id="btnText">OTP Bhejein</span>
        </button>
    </div>

    <div id="otpSection" class="hidden">
        <div class="input-group">
            <input type="text" id="otp" placeholder="6-digit Code" maxlength="6">
        </div>
        <button onclick="handleVerifyOTP()" style="background: linear-gradient(135deg, var(--secondary), #0056b3);">
            Verify & Signup
        </button>
    </div>

    <p id="msg"></p>
</div>

<script>
    async function handleSendOTP() {
        const email = document.getElementById('email').value;
        const btnLoader = document.getElementById('btnLoader');
        const btnText = document.getElementById('btnText');
        const msg = document.getElementById('msg');
        const subtext = document.getElementById('subtext');

        // 1. Email Check
        if(!email) {
            msg.style.color = "red";
            msg.innerText = "❌ Bhai email toh daalo!";
            return;
        }

        // 2. Format Check
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            msg.style.color = "red";
            msg.innerText = "❌ Bhai email ka format sahi nahi hai!";
            return;
        }

        // Start Loading
        btnLoader.style.display = 'inline-block';
        btnText.innerText = "Processing...";
        msg.innerText = ""; // Purana message saaf karo

        try {
            const res = await fetch('/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (res.ok) {
                // Section Toggle
                document.getElementById('emailSection').classList.add('hidden');
                document.getElementById('otpSection').classList.remove('hidden');
                document.getElementById('otpSection').classList.add('visible');
                
                // --- CUSTOM MESSAGE UPDATE ---
                subtext.innerText = "Verification Code Bheja Gaya Hai.";
                msg.style.color = "#00a884"; 
                msg.style.fontWeight = "bold";
                msg.innerHTML = `✅ Humne aapka OTP aapki is email id <b>${email}</b> par bhej diya hai. Pls email check karein!`;
            } else {
                msg.style.color = "red";
                msg.innerText = "❌ " + (data.message || "Email nahi gaya. Try again.");
            }
        } catch (e) {
            msg.style.color = "red";
            msg.innerText = "❌ Server error! Check your connection.";
        } finally {
            btnLoader.style.display = 'none';
            btnText.innerText = "OTP Bhejein";
        }
    }

    async function handleVerifyOTP() {
        const email = document.getElementById('email').value;
        const userOtp = document.getElementById('otp').value;
        const msg = document.getElementById('msg');

        if(!userOtp) {
            msg.style.color = "red";
            msg.innerText = "❌ OTP toh daalo bhai!";
            return;
        }

        try {
            const res = await fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, userOtp })
            });

            const data = await res.json();

            if (res.ok) {
    const data = await res.json(); // Ye line add/check karo
    
    // TOKEN KO SAVE KARO (LocalStorage mein)
    localStorage.setItem('dawaToken', data.token);

    msg.style.color = "green";
    msg.innerText = "✅ Verification Successful! Redirecting...";
    setTimeout(() => {
        window.location.href = '/dashboard.html';
    }, 1500);
}
        } catch (e) {
            msg.innerText = "❌ Verification failed.";
        }
    }
</script>

</body>
</html>
