<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Dawa Duniya | Secure Login
    </title>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet"
    />

    <style>

        :root {
            --primary: #00a884;
            --secondary: #007bff;
            --bg: #f0f4f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: "Poppins", sans-serif;

            background: var(--bg);

            display: flex;

            align-items: center;

            justify-content: center;

            min-height: 100vh;

            padding: 20px;
        }

        .card {

            width: 100%;
            max-width: 400px;

            background: rgba(255,255,255,0.9);

            backdrop-filter: blur(12px);

            padding: 35px;

            border-radius: 24px;

            box-shadow:
                0 15px 35px rgba(0,0,0,0.1);

            border: 1px solid rgba(255,255,255,0.5);

            text-align: center;
        }

        h2 {

            color: var(--primary);

            margin-bottom: 10px;

            font-size: 30px;
        }

        #subtext {

            color: #666;

            font-size: 14px;

            margin-bottom: 25px;
        }

        .input-group {

            margin-bottom: 18px;
        }

        input {

            width: 100%;

            padding: 14px;

            border-radius: 12px;

            border: 2px solid #eee;

            outline: none;

            font-size: 15px;

            transition: 0.3s;
        }

        input:focus {

            border-color: var(--primary);

            box-shadow:
                0 0 10px rgba(0,168,132,0.2);
        }

        button {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 12px;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            color: white;

            transition: 0.3s;
        }

        #sendBtn {

            background:
                linear-gradient(
                    135deg,
                    var(--primary),
                    #00d2a0
                );
        }

        #verifyBtn {

            background:
                linear-gradient(
                    135deg,
                    var(--secondary),
                    #0056b3
                );
        }

        button:hover {

            transform: translateY(-2px);
        }

        .hidden {
            display: none;
        }

        #msg {

            margin-top: 18px;

            min-height: 20px;

            font-size: 14px;

            font-weight: 500;
        }

        .loader {

            border: 3px solid #f3f3f3;

            border-top: 3px solid white;

            border-radius: 50%;

            width: 18px;

            height: 18px;

            animation: spin 1s linear infinite;

            display: none;

            margin: auto;
        }

        @keyframes spin {

            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Dawa Duniya</h2>

    <p id="subtext">
        Aapki sehat, humari zimmedari.
    </p>

    <!-- EMAIL SECTION -->
    <div id="emailSection">

        <div class="input-group">

            <input
                type="email"
                id="email"
                placeholder="Apna Email Daalein"
            />

        </div>

        <button id="sendBtn">

            <span id="btnLoader" class="loader"></span>

            <span id="btnText">
                OTP Bhejein
            </span>

        </button>

    </div>

    <!-- OTP SECTION -->
    <div
        id="otpSection"
        class="hidden"
    >

        <div class="input-group">

            <input
                type="text"
                id="otp"
                maxlength="6"
                placeholder="6-digit OTP"
            />

        </div>

        <button id="verifyBtn">
            Verify & Login
        </button>

    </div>

    <p id="msg"></p>

</div>

<script>

    // =====================================
    // API URL
    // =====================================

    const API_URL =
  "https://dawa-duniya-otp.vercel.app";

    // FOR VERCEL USE THIS:
    // const API_URL =
    // "https://dawa-duniya-otp.vercel.app";

    // =====================================
    // AUTO LOGIN CHECK
    // =====================================

    if (
        localStorage.getItem("dawaToken")
    ) {

        window.location.href =
            "/dashboard.html";
    }

    // =====================================
    // BUTTON EVENTS
    // =====================================

    document
        .getElementById("sendBtn")
        .addEventListener(
            "click",
            handleSendOTP
        );

    document
        .getElementById("verifyBtn")
        .addEventListener(
            "click",
            handleVerifyOTP
        );

    // =====================================
    // SEND OTP
    // =====================================

    async function handleSendOTP() {

        const email =
            document
                .getElementById("email")
                .value
                .trim();

        const msg =
            document.getElementById("msg");

        const loader =
            document.getElementById(
                "btnLoader"
            );

        const btnText =
            document.getElementById(
                "btnText"
            );

        // =========================
        // VALIDATION
        // =========================

        if (!email) {

            msg.style.color = "red";

            msg.innerText =
                "❌ Email daalo bhai";

            return;
        }

        loader.style.display = "block";

        btnText.style.display = "none";

        msg.innerText = "";

        try {

            const res = await fetch(
                `${API_URL}/send-otp`,
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    credentials: "include",

                    body: JSON.stringify({
                        email
                    })
                }
            );

            const data =
                await res.json();

            console.log(data);

            if (data.success) {

                localStorage.setItem(
                    "tempVToken",
                    data.vToken
                );

                document
                    .getElementById(
                        "emailSection"
                    )
                    .classList.add(
                        "hidden"
                    );

                document
                    .getElementById(
                        "otpSection"
                    )
                    .classList.remove(
                        "hidden"
                    );

                msg.style.color =
                    "green";

                msg.innerHTML =
                    `✅ OTP <b>${email}</b> par bhej diya gaya hai`;

            } else {

                msg.style.color =
                    "red";

                msg.innerText =
                    "❌ " +
                    data.message;
            }

        } catch (err) {

            console.error(err);

            msg.style.color =
                "red";

            msg.innerText =
                "❌ Server Error";
        }

        finally {

            loader.style.display =
                "none";

            btnText.style.display =
                "inline";
        }
    }

    // =====================================
    // VERIFY OTP
    // =====================================

    async function handleVerifyOTP() {

        const userOtp =
            document
                .getElementById("otp")
                .value
                .trim();

        const vToken =
            localStorage.getItem(
                "tempVToken"
            );

        const msg =
            document.getElementById(
                "msg"
            );

        if (!userOtp) {

            msg.style.color = "red";

            msg.innerText =
                "❌ OTP daalo";

            return;
        }

        try {

            const res = await fetch(
                `${API_URL}/verify-otp`,
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    credentials: "include",

                    body: JSON.stringify({
                        userOtp,
                        vToken
                    })
                }
            );

            const data =
                await res.json();

            console.log(data);

            if (data.success) {

                localStorage.removeItem(
                    "tempVToken"
                );

                localStorage.setItem(
                    "dawaToken",
                    data.token
                );

                msg.style.color =
                    "green";

                msg.innerText =
                    "✅ Login Successful";

                setTimeout(() => {

                    window.location.href =
                        "/dashboard.html";

                }, 1200);

            } else {

                msg.style.color =
                    "red";

                msg.innerText =
                    "❌ " +
                    data.message;
            }

        } catch (err) {

            console.error(err);

            msg.style.color =
                "red";

            msg.innerText =
                "❌ Verification failed";
        }
    }

</script>

</body>
</html>
