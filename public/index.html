<script>
const API_URL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
    ? "http://localhost:3000"
    : "https://dawa-duniya-otp.vercel.app";

console.log("Connected to API:", API_URL);

// Auto login check
if (localStorage.getItem("dawaToken")) {
    window.location.href = "dashboard.html";
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("sendBtn").addEventListener("click", handleSendOTP);
    document.getElementById("verifyBtn").addEventListener("click", handleVerifyOTP);
});

let tempVToken = "";

// ================= SEND OTP =================
async function handleSendOTP() {
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");

    if (!email) {
        msg.innerText = "❌ Email required";
        msg.style.color = "red";
        return;
    }

    sendBtn.disabled = true;
    msg.innerText = "Sending OTP...";
    msg.style.color = "blue";

    try {
        const res = await fetch(`${API_URL}/send-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.success) {
            tempVToken = data.vToken;

            document.getElementById("emailSection").classList.add("hidden");
            document.getElementById("otpSection").classList.remove("hidden");

            msg.innerText = "✅ OTP sent successfully";
            msg.style.color = "green";
        } else {
            msg.innerText = "❌ " + data.message;
            msg.style.color = "red";
        }

    } catch (err) {
        console.log(err);
        msg.innerText = "❌ Server error";
        msg.style.color = "red";
    } finally {
        sendBtn.disabled = false;
    }
}

// ================= VERIFY OTP =================
async function handleVerifyOTP() {
    const otp = document.getElementById("otp").value.trim();
    const msg = document.getElementById("msg");
    const verifyBtn = document.getElementById("verifyBtn");

    if (!otp) {
        msg.innerText = "❌ OTP required";
        msg.style.color = "red";
        return;
    }

    verifyBtn.disabled = true;
    msg.innerText = "Verifying...";
    msg.style.color = "blue";

    try {
        const res = await fetch(`${API_URL}/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                userOtp: otp,
                vToken: tempVToken
            })
        });

        const data = await res.json();

        if (data.success) {
            localStorage.setItem("dawaToken", data.token);

            msg.innerText = "✅ Login successful!";
            msg.style.color = "green";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 800);

        } else {
            msg.innerText = "❌ " + data.message;
            msg.style.color = "red";
        }

    } catch (err) {
        console.log(err);
        msg.innerText = "❌ Server error";
        msg.style.color = "red";
    } finally {
        verifyBtn.disabled = false;
    }
}
</script>
