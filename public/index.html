<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawa Duniya Auth</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
body{
    margin:0;
    font-family:Poppins;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f172a,#1e293b);
}

/* GLASS CARD */
.card{
    width:380px;
    padding:28px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

h2{
    margin:0;
    color:#00ffcc;
}

.subtitle{
    font-size:12px;
    opacity:0.8;
    margin-bottom:15px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin:8px 0;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
}

.primary{
    background:#00ffcc;
    color:#000;
}

.secondary{
    background:#3b82f6;
    color:#fff;
}

button:hover{
    transform:scale(1.03);
}

/* OTP BOXES */
.otp-container{
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin:15px 0;
}

.otp-box{
    width:45px;
    height:50px;
    text-align:center;
    font-size:18px;
    border-radius:10px;
    border:none;
    outline:none;
    transition:0.2s;
}

.otp-box:focus{
    transform:scale(1.1);
    box-shadow:0 0 10px #00ffcc;
}

/* SHAKE ANIMATION */
@keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    50%{transform:translateX(5px)}
    75%{transform:translateX(-5px)}
}

.shake{
    animation:shake 0.3s;
}

/* TIMER */
.timer{
    font-size:12px;
    margin-top:8px;
    opacity:0.8;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="card">

<h2>Dawa Duniya</h2>
<div class="subtitle">Aapki sehat ka sathi ❤️</div>

<!-- EMAIL -->
<div id="emailSection">
    <input id="email" type="email" placeholder="Enter Email"/>
    <button class="primary" onclick="handleSendOTP()">Send OTP</button>
</div>

<!-- OTP -->
<div id="otpSection" class="hidden">

    <div class="otp-container">
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
        <input class="otp-box" maxlength="1"/>
    </div>

    <button class="secondary" onclick="handleVerifyOTP()">Verify OTP</button>

    <div class="timer" id="timerText"></div>

    <button id="resendBtn" class="primary" onclick="handleResend()" disabled>
        Resend OTP
    </button>
</div>

<p id="msg"></p>

</div>

<script>
const API = window.location.hostname==="localhost"
? "http://localhost:3000"
: "https://dawa-duniya-otp.vercel.app";

let tempVToken="";
let countdown=60;
let timerInterval=null;

/* SEND OTP */
async function handleSendOTP(){
    const email=document.getElementById("email").value;
    const msg=document.getElementById("msg");

    msg.innerText="Sending OTP...";
    msg.style.color="white";

    const res=await fetch(`${API}/send-otp`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email})
    });

    const data=await res.json();

    if(data.success){
        tempVToken=data.vToken;

        document.getElementById("emailSection").classList.add("hidden");
        document.getElementById("otpSection").classList.remove("hidden");

        startTimer();

    }else{
        msg.innerText=data.message;
        msg.style.color="red";
    }
}

/* TIMER */
function startTimer(){
    const btn=document.getElementById("resendBtn");
    const text=document.getElementById("timerText");

    countdown=60;
    btn.disabled=true;

    timerInterval=setInterval(()=>{
        text.innerText=`Resend OTP in ${countdown}s`;
        countdown--;

        if(countdown<0){
            clearInterval(timerInterval);
            btn.disabled=false;
            text.innerText="You can resend OTP now";
        }
    },1000);
}

/* RESEND */
function handleResend(){
    handleSendOTP();
}

/* VERIFY OTP */
async function handleVerifyOTP(){

    const inputs=document.querySelectorAll(".otp-box");
    const msg=document.getElementById("msg");

    let otp="";
    inputs.forEach(i=>otp+=i.value);

    if(otp.length!==6){
        triggerShake();
        msg.innerText="Enter valid OTP";
        msg.style.color="red";
        return;
    }

    const res=await fetch(`${API}/verify-otp`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            userOtp:otp,
            vToken:tempVToken
        })
    });

    const data=await res.json();

    if(data.success){
        localStorage.setItem("dawaToken",data.token);
        msg.innerText="Login Successful";

        setTimeout(()=>{
            window.location.href="dashboard.html";
        },800);

    }else{
        triggerShake();
        msg.innerText="Wrong OTP";
        msg.style.color="red";
    }
}

/* SHAKE */
function triggerShake(){
    document.querySelector(".otp-container").classList.add("shake");
    setTimeout(()=>{
        document.querySelector(".otp-container").classList.remove("shake");
    },300);
}

/* OTP AUTO MOVE + PASTE */
document.addEventListener("DOMContentLoaded",()=>{
    const inputs=document.querySelectorAll(".otp-box");

    inputs.forEach((input,index)=>{
        input.addEventListener("input",()=>{
            if(input.value && index<inputs.length-1){
                inputs[index+1].focus();
            }
        });

        input.addEventListener("keydown",(e)=>{
            if(e.key==="Backspace" && !input.value && index>0){
                inputs[index-1].focus();
            }
        });

        input.addEventListener("paste",(e)=>{
            e.preventDefault();
            const data=e.clipboardData.getData("text").split("");
            inputs.forEach((inp,i)=>inp.value=data[i]||"");
        });
    });
});
</script>

</body>
</html>
