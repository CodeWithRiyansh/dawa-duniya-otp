<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawa Duniya | OTP Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
/* 1. CSS RESET & FIXES */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box; /* Sabse important: alignment isi se thik hogi */
}

body{
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#0f172a,#111827);
    overflow: hidden;
}

/* CARD */
.card{
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    text-align: center;
    color: white;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

h2 { margin-bottom: 5px; color: #00ffcc; }

/* INPUT & BUTTONS COMMON */
input, button {
    width: 100%; /* Ab ye card se bahar nahi jayega */
    display: block;
    margin-top: 15px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    transition: 0.3s;
}

input {
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

input:focus {
    background: rgba(255,255,255,0.1);
    border-color: #00ffcc;
}

button {
    padding: 14px;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

button:hover { transform: translateY(-2px); opacity: 0.9; }
button:active { transform: translateY(0); }
button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.primary { background: #00ffcc; color: #000; }
.secondary { background: #3b82f6; color: #fff; }

/* OTP CONTAINER */
.otp-container {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin: 20px 0;
}

.otp-box {
    width: 45px;
    height: 55px;
    margin-top: 0; /* Resetting default input margin */
    text-align: center;
    font-size: 20px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
}

.otp-box:focus {
    transform: scale(1.05);
    border-color: #00ffcc;
    box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
}

/* UTILS */
.timer { font-size: 13px; margin: 15px 0; color: #94a3b8; }
.hidden { display: none; }

/* SHAKE ANIMATION */
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
}
.shake { animation: shake 0.4s; }

/* TOAST */
#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #fff;
    color: #000;
    padding: 12px 25px;
    border-radius: 30px;
    font-weight: 500;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    opacity: 0;
    z-index: 1000;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<body>

<div class="card">
    <h2>Dawa Duniya</h2>
    <p style="font-size:12px; opacity:0.7; margin-bottom: 20px;">Aapki sehat ka sathi ❤️</p>

    <!-- EMAIL SECTION -->
    <div id="emailSection">
        <input id="email" type="email" placeholder="Enter Email Address" autocomplete="off"/>
        <button class="primary" onclick="sendOTP()">Send OTP</button>
    </div>

    <!-- OTP SECTION -->
    <div id="otpSection" class="hidden">
        <div class="otp-container" id="otpBoxContainer">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
        </div>

        <button class="secondary" onclick="verifyOTP()">Verify OTP</button>
        <div class="timer" id="timer"></div>
        <button id="resendBtn" class="primary" onclick="resendOTP()" disabled style="margin-top: 5px;">
            Resend OTP
        </button>
    </div>
</div>

<div id="toast"></div>

<script>
const API = window.location.hostname === "localhost" 
    ? "http://localhost:3000" 
    : "https://dawa-duniya-otp.vercel.app";

let tempVToken = "";
let countdown = 60;
let interval;

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
}

async function sendOTP() {
    const email = document.getElementById("email").value;
    if(!email || !email.includes('@')) {
        toast("Please enter a valid email");
        return;
    }

    try {
        const res = await fetch(`${API}/send-otp`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email })
        });
        const data = await res.json();

        if(data.success) {
            tempVToken = data.vToken;
            document.getElementById("emailSection").classList.add("hidden");
            document.getElementById("otpSection").classList.remove("hidden");
            startTimer();
            toast("OTP sent to your email");
        } else {
            toast(data.message || "Failed to send OTP");
        }
    } catch (err) {
        toast("Server error. Try again.");
    }
}

function startTimer() {
    const btn = document.getElementById("resendBtn");
    const t = document.getElementById("timer");
    countdown = 60;
    btn.disabled = true;

    clearInterval(interval);
    interval = setInterval(() => {
        t.innerText = `Resend available in ${countdown}s`;
        countdown--;
        if(countdown < 0) {
            clearInterval(interval);
            btn.disabled = false;
            t.innerText = "You can resend OTP now";
        }
    }, 1000);
}

function resendOTP() {
    sendOTP();
}

async function verifyOTP() {
    const inputs = document.querySelectorAll(".otp-box");
    let otp = "";
    inputs.forEach(i => otp += i.value);

    if(otp.length !== 6) {
        shake();
        toast("Please enter 6-digit OTP");
        return;
    }

    try {
        const res = await fetch(`${API}/verify-otp`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ userOtp: otp, vToken: tempVToken })
        });
        const data = await res.json();

        if(data.success) {
            localStorage.setItem("dawaToken", data.token);
            toast("Login Successful! Redirecting...");
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
        } else {
            shake();
            toast("Invalid OTP. Try again.");
        }
    } catch (err) {
        toast("Verification failed.");
    }
}

function shake() {
    const container = document.getElementById("otpBoxContainer");
    container.classList.add("shake");
    setTimeout(() => container.classList.remove("shake"), 400);
}

// OTP AUTO FOCUS LOGIC
document.addEventListener("DOMContentLoaded", () => {
    const inputs = document.querySelectorAll(".otp-box");
    inputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
            if (e.inputType === "deleteContentBackward") return;
            if (input.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });

        input.addEventListener("paste", (e) => {
            e.preventDefault();
            const data = e.clipboardData.getData("text").slice(0, 6).split("");
            inputs.forEach((inp, i) => {
                if (data[i]) inp.value = data[i];
            });
            if(data.length > 0) inputs[Math.min(data.length, 5)].focus();
        });
    });
});
</script>

</body>
</html>
