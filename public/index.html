<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dawa Duniya Auth</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #22c55e;
      color: white;
    }

    .tabs {
      display: flex;
      margin-bottom: 10px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      background: #334155;
    }

    .active {
      background: #22c55e;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="box">

  <div class="tabs">
    <div class="tab active" onclick="setMode('otp')">OTP Login</div>
    <div class="tab" onclick="setMode('link')">Email Link</div>
  </div>

  <!-- EMAIL -->
  <input id="email" placeholder="Enter email" />

  <!-- OTP SECTION -->
  <div id="otpBox">
    <button onclick="sendOTP()">Send OTP</button>
    <input id="otp" placeholder="Enter OTP" />
    <button onclick="verifyOTP()">Verify OTP</button>
  </div>

  <!-- LINK SECTION -->
  <div id="linkBox" class="hidden">
    <button onclick="sendLink()">Send Verification Link</button>
    <p style="font-size:12px;color:#94a3b8;">
      Check your email inbox and click link
    </p>
  </div>

  <p id="msg"></p>
</div>

<script>
let mode = "otp";

function setMode(m) {
  mode = m;

  document.getElementById("otpBox").classList.toggle("hidden", m !== "otp");
  document.getElementById("linkBox").classList.toggle("hidden", m !== "link");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
}

async function sendOTP() {
  const email = document.getElementById("email").value;

  const res = await fetch("/send-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  document.getElementById("msg").innerText =
    data.success ? "OTP sent 🚀" : data.message;
}

async function verifyOTP() {
  const otp = document.getElementById("otp").value;
  const vToken = window.vToken; // store later

  const res = await fetch("/verify-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userOtp: otp,
      vToken
    })
  });

  const data = await res.json();

  document.getElementById("msg").innerText =
    data.success ? "Login success 🚀" : data.message;
}

async function sendLink() {
  const email = document.getElementById("email").value;

  const res = await fetch("/send-link", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  document.getElementById("msg").innerText =
    data.success ? "Link sent 🚀" : "Error sending link";
}
</script>

</body>
</html>
