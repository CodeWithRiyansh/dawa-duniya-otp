<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawa Duniya | OTP Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
body{
    margin:0;
    font-family:Poppins;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f172a,#111827);
}

/* CARD */
.card{
    width:380px;
    padding:28px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
    color:white;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.primary{
    background:#00ffcc;
    color:#000;
}

.secondary{
    background:#3b82f6;
    color:#fff;
}

/* OTP BOX */
.otp-container{
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin:15px 0;
}

.otp-box{
    width:45px;
    height:50px;
    text-align:center;
    font-size:18px;
    border-radius:10px;
    border:none;
    outline:none;
    transition:0.2s;
}

.otp-box:focus{
    transform:scale(1.2);
    box-shadow:0 0 12px #00ffcc;
}

/* SHAKE */
@keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-5px)}
    50%{transform:translateX(5px)}
    75%{transform:translateX(-5px)}
}
.shake{
    animation:shake 0.3s;
}

/* TIMER */
.timer{
    font-size:12px;
    margin:10px 0;
    opacity:0.8;
}

/* TOAST */
#toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    padding:10px 18px;
    border-radius:10px;
    opacity:0;
    transition:0.3s;
    color:white;
}
.show{
    opacity:1;
    transform:translateX(-50%) translateY(-10px);
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="card">

<h2>Dawa Duniya</h2>
<p style="font-size:12px;opacity:0.8">Aapki sehat ka sathi ❤️</p>

<!-- EMAIL -->
<div id="emailSection">
    <input id="email" type="email" placeholder="Enter Email"/>
    <button class="primary" onclick="sendOTP()">Send OTP</button>
</div>

<!-- OTP -->
<div id="otpSection" class="hidden">

    <div class="otp-container">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
        <input class="otp-box" maxlength="1">
    </div>

    <button class="secondary" onclick="verifyOTP()">Verify OTP</button>

    <div class="timer" id="timer"></div>

    <button id="resendBtn" class="primary" onclick="resendOTP()" disabled>
        Resend OTP
    </button>

</div>

</div>

<div id="toast"></div>

<script>
const API = window.location.hostname==="localhost"
? "http://localhost:3000"
: "https://dawa-duniya-otp.vercel.app";

let tempVToken="";
let countdown=60;
let interval;

/* TOAST */
function toast(msg){
    const t=document.getElementById("toast");
    t.innerText=msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1500);
}

/* SEND OTP */
async function sendOTP(){
    const email=document.getElementById("email").value;

    if(!email){
        toast("Enter email");
        return;
    }

    const res=await fetch(`${API}/send-otp`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email})
    });

    const data=await res.json();

    if(data.success){
        tempVToken=data.vToken;
        document.getElementById("emailSection").style.display="none";
        document.getElementById("otpSection").style.display="block";
        startTimer();
        toast("OTP sent");
    }else{
        toast(data.message);
    }
}

/* TIMER */
function startTimer(){
    const btn=document.getElementById("resendBtn");
    const t=document.getElementById("timer");

    countdown=60;
    btn.disabled=true;

    interval=setInterval(()=>{
        t.innerText=`Resend in ${countdown}s`;
        countdown--;

        if(countdown<0){
            clearInterval(interval);
            btn.disabled=false;
            t.innerText="You can resend OTP";
        }
    },1000);
}

/* RESEND */
function resendOTP(){
    sendOTP();
}

/* VERIFY OTP */
async function verifyOTP(){

    const inputs=document.querySelectorAll(".otp-box");
    let otp="";

    inputs.forEach(i=>otp+=i.value);

    if(otp.length!==6){
        shake();
        toast("Invalid OTP");
        return;
    }

    const res=await fetch(`${API}/verify-otp`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            userOtp:otp,
            vToken:tempVToken
        })
    });

    const data=await res.json();

    if(data.success){
        localStorage.setItem("dawaToken",data.token);
        toast("Login success");

        setTimeout(()=>{
            window.location.href="dashboard.html";
        },800);
    }else{
        shake();
        toast("Wrong OTP");
    }
}

/* SHAKE */
function shake(){
    document.querySelector(".otp-container").classList.add("shake");
    setTimeout(()=>{
        document.querySelector(".otp-container").classList.remove("shake");
    },300);
}

/* OTP AUTO MOVE */
document.addEventListener("DOMContentLoaded",()=>{
    const inputs=document.querySelectorAll(".otp-box");

    inputs.forEach((input,index)=>{
        input.addEventListener("input",()=>{
            if(input.value && index<inputs.length-1){
                inputs[index+1].focus();
            }
        });

        input.addEventListener("keydown",(e)=>{
            if(e.key==="Backspace" && !input.value && index>0){
                inputs[index-1].focus();
            }
        });

        input.addEventListener("paste",(e)=>{
            e.preventDefault();
            const data=e.clipboardData.getData("text").split("");
            inputs.forEach((inp,i)=>inp.value=data[i]||"");
        });
    });
});
</script>

</body>
</html>
