<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawa Duniya | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f7f9fc;
}

/* CENTER WRAPPER */
.wrapper{
    width:100%;
    max-width:360px;
    text-align:center;
}

/* LOGO */
.logo{
    font-size:28px;
    font-weight:600;
    color:#00a884;
    margin-bottom:5px;
}

/* TAGLINE */
.tagline{
    font-size:13px;
    color:#666;
    margin-bottom:25px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    margin-top:10px;
    transition:0.2s;
}

button:hover{
    transform:translateY(-1px);
}

.primary{
    background:#00a884;
    color:white;
}

.secondary{
    background:#007bff;
    color:white;
}

/* HIDE */
.hidden{display:none;}

/* MSG */
#msg{
    margin-top:15px;
    font-size:13px;
    color:#444;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- LOGO -->
    <div class="logo">Dawa Duniya</div>
    <div class="tagline">Aapki sehat ka sathi ❤️</div>

    <!-- EMAIL -->
    <div id="emailSection">
        <input type="email" id="email" placeholder="Enter Email"/>
        <button class="primary" id="sendBtn">Send OTP</button>
    </div>

    <!-- OTP -->
    <div id="otpSection" class="hidden">
        <input type="text" id="otp" placeholder="Enter OTP"/>
        <button class="secondary" id="verifyBtn">Verify & Login</button>
    </div>

    <div id="msg"></div>

</div>

<script>
const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://dawa-duniya-otp.vercel.app";

let tempVToken = "";

// SEND OTP
async function handleSendOTP(){
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");

    if(!email){
        msg.innerText="Enter email";
        msg.style.color="red";
        return;
    }

    msg.innerText="Sending OTP...";
    msg.style.color="#007bff";

    try{
        const res = await fetch(`${API_URL}/send-otp`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({email})
        });

        const data = await res.json();

        if(data.success){
            tempVToken = data.vToken;
            document.getElementById("emailSection").classList.add("hidden");
            document.getElementById("otpSection").classList.remove("hidden");
            msg.innerText="OTP sent successfully";
            msg.style.color="green";
        }else{
            msg.innerText=data.message;
            msg.style.color="red";
        }

    }catch(err){
        msg.innerText="Server error";
        msg.style.color="red";
    }
}

// VERIFY OTP
async function handleVerifyOTP(){
    const otp = document.getElementById("otp").value.trim();
    const msg = document.getElementById("msg");

    if(!otp){
        msg.innerText="Enter OTP";
        msg.style.color="red";
        return;
    }

    msg.innerText="Verifying...";
    msg.style.color="#007bff";

    try{
        const res = await fetch(`${API_URL}/verify-otp`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                userOtp:otp,
                vToken:tempVToken
            })
        });

        const data = await res.json();

        if(data.success){
            localStorage.setItem("dawaToken",data.token);
            msg.innerText="Login successful";

            setTimeout(()=>{
                window.location.href="dashboard.html";
            },800);

        }else{
            msg.innerText=data.message;
            msg.style.color="red";
        }

    }catch(err){
        msg.innerText="Verification failed";
        msg.style.color="red";
    }
}

// EVENTS
document.getElementById("sendBtn").addEventListener("click",handleSendOTP);
document.getElementById("verifyBtn").addEventListener("click",handleVerifyOTP);

</script>

</body>
</html>
