<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dawa Duniya | Secure Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"/>

    <style>
        body {
            font-family: Poppins, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 380px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        #sendBtn { background: #00a884; }
        #verifyBtn { background: #007bff; }

        .hidden { display: none; }

        #msg {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Dawa Duniya</h2>

    <!-- EMAIL -->
    <div id="emailSection">
        <input type="email" id="email" placeholder="Enter Email"/>
        <button id="sendBtn">Send OTP</button>
    </div>

    <!-- OTP -->
    <div id="otpSection" class="hidden">
        <input type="text" id="otp" placeholder="Enter OTP"/>
        <button id="verifyBtn">Verify & Login</button>
    </div>

    <p id="msg"></p>
</div>

<!-- ================= SCRIPT (FIXED PROPERLY) ================= -->
<script>
const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://dawa-duniya-otp.vercel.app";

console.log("Connected:", API_URL);

let tempVToken = "";

// ================= SEND OTP =================
async function handleSendOTP() {
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");

    if (!email) {
        msg.innerText = "❌ Email required";
        msg.style.color = "red";
        return;
    }

    try {
        msg.innerText = "Sending OTP...";
        msg.style.color = "blue";

        const res = await fetch(`${API_URL}/send-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (data.success) {
            tempVToken = data.vToken;

            document.getElementById("emailSection").classList.add("hidden");
            document.getElementById("otpSection").classList.remove("hidden");

            msg.innerText = "✅ OTP sent!";
            msg.style.color = "green";
        } else {
            msg.innerText = "❌ " + data.message;
            msg.style.color = "red";
        }

    } catch (err) {
        msg.innerText = "❌ Server error";
        msg.style.color = "red";
    }
}

// ================= VERIFY OTP (FIXED GLOBAL) =================
window.handleVerifyOTP = async function () {
    const otp = document.getElementById("otp").value.trim();
    const msg = document.getElementById("msg");

    if (!otp) {
        msg.innerText = "❌ OTP required";
        msg.style.color = "red";
        return;
    }

    try {
        msg.innerText = "Verifying...";
        msg.style.color = "blue";

        const res = await fetch(`${API_URL}/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                userOtp: otp,
                vToken: tempVToken
            })
        });

        const data = await res.json();

        if (data.success) {
            localStorage.setItem("dawaToken", data.token);

            msg.innerText = "✅ Login Successful";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 800);

        } else {
            msg.innerText = "❌ " + data.message;
            msg.style.color = "red";
        }

    } catch (err) {
        msg.innerText = "❌ Server error";
        msg.style.color = "red";
    }
};

// ================= EVENTS (AFTER DOM LOAD) =================
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("sendBtn").addEventListener("click", handleSendOTP);
    document.getElementById("verifyBtn").addEventListener("click", window.handleVerifyOTP);
});
</script>

</body>
</html>
