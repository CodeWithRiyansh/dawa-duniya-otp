<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawa Duniya | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    overflow:hidden;
}

/* SOFT FLOAT BACKGROUND EFFECT */
body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#00a884;
    filter:blur(120px);
    top:-100px;
    left:-100px;
    opacity:0.4;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#3b82f6;
    filter:blur(120px);
    bottom:-100px;
    right:-100px;
    opacity:0.3;
}

/* CARD */
.wrapper{
    width:100%;
    max-width:380px;
    padding:30px;
    border-radius:20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    text-align:center;
    z-index:10;
}

/* LOGO */
.logo{
    font-size:26px;
    font-weight:600;
    color:#00ffcc;
    letter-spacing:0.5px;
}

.tagline{
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:25px;
}

/* INPUT */
input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color:white;
    outline:none;
    transition:0.2s;
}

input:focus{
    border-color:#00ffcc;
    box-shadow:0 0 15px rgba(0,255,204,0.2);
}

/* BUTTON */
button{
    width:100%;
    padding:13px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    transform:translateY(-2px);
}

.primary{
    background: linear-gradient(135deg,#00ffcc,#00a884);
    color:#000;
}

.secondary{
    background: linear-gradient(135deg,#3b82f6,#2563eb);
    color:#fff;
}

/* MSG */
#msg{
    margin-top:15px;
    font-size:13px;
    color:#e2e8f0;
}

/* OTP BOX SIMPLE CLEAN */
.hidden{display:none;}
</style>
</head>

<body>

<div class="wrapper">

    <div class="logo">Dawa Duniya</div>
    <div class="tagline">Aapki sehat ka sathi ❤️</div>

    <!-- EMAIL -->
    <div id="emailSection">
        <input type="email" id="email" placeholder="Enter your email"/>
        <button class="primary" id="sendBtn">Send OTP</button>
    </div>

    <!-- OTP -->
    <div id="otpSection" class="hidden">
        <input type="text" id="otp" placeholder="Enter OTP"/>
        <button class="secondary" id="verifyBtn">Verify & Login</button>
    </div>

    <div id="msg"></div>

</div>

<script>
const API_URL =
  window.location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://dawa-duniya-otp.vercel.app";

let tempVToken = "";

// SEND OTP
async function handleSendOTP(){
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");

    if(!email){
        msg.innerText="Enter email";
        msg.style.color="#ff6b6b";
        return;
    }

    msg.innerText="Sending OTP...";
    msg.style.color="#00ffcc";

    const res = await fetch(`${API_URL}/send-otp`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email})
    });

    const data = await res.json();

    if(data.success){
        tempVToken = data.vToken;
        document.getElementById("emailSection").classList.add("hidden");
        document.getElementById("otpSection").classList.remove("hidden");
        msg.innerText="OTP sent successfully";
        msg.style.color="#00ffcc";
    }else{
        msg.innerText=data.message;
        msg.style.color="#ff6b6b";
    }
}

// VERIFY OTP
async function handleVerifyOTP(){
    const otp = document.getElementById("otp").value.trim();
    const msg = document.getElementById("msg");

    msg.innerText="Verifying...";
    msg.style.color="#60a5fa";

    const res = await fetch(`${API_URL}/verify-otp`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            userOtp:otp,
            vToken:tempVToken
        })
    });

    const data = await res.json();

    if(data.success){
        localStorage.setItem("dawaToken",data.token);
        msg.innerText="Login Successful";

        setTimeout(()=>{
            window.location.href="dashboard.html";
        },800);

    }else{
        msg.innerText=data.message;
        msg.style.color="#ff6b6b";
    }
}

document.getElementById("sendBtn").addEventListener("click",handleSendOTP);
document.getElementById("verifyBtn").addEventListener("click",handleVerifyOTP);
</script>

</body>
</html>
