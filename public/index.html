<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawa Duniya | OTP Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #111827);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 360px;
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  text-align: center;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

#sendBtn { background: #00ffcc; }
#verifyBtn { background: #3b82f6; color: white; }

.hidden { display: none; }

#msg {
  margin-top: 12px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="card">

  <h2>Dawa Duniya</h2>

  <!-- EMAIL -->
  <div id="emailSection">
    <input id="email" type="email" placeholder="Enter Email" />
    <button id="sendBtn" onclick="sendOTP()">Send OTP</button>
  </div>

  <!-- OTP -->
  <div id="otpSection" class="hidden">
    <input id="otp" type="text" placeholder="Enter 6-digit OTP" maxlength="6"/>
    <button id="verifyBtn" onclick="verifyOTP()">Verify OTP</button>
  </div>

  <div id="msg"></div>

</div>

<script>
const API =
  window.location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://dawa-duniya-otp.vercel.app";

let tempVToken = "";

// ================= MSG =================
function showMsg(msg, isError = false) {
  const el = document.getElementById("msg");
  el.innerText = msg;
  el.style.color = isError ? "#ff4d4d" : "#00ffcc";
}

// ================= SEND OTP =================
async function sendOTP() {
  const email = document.getElementById("email").value.trim();

  if (!email) {
    showMsg("Enter valid email", true);
    return;
  }

  try {
    showMsg("Sending OTP...");

    const res = await fetch(`${API}/send-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.success) {
      tempVToken = data.vToken;

      document.getElementById("emailSection").classList.add("hidden");
      document.getElementById("otpSection").classList.remove("hidden");

      showMsg("OTP sent successfully");
    } else {
      showMsg(data.message || "Failed", true);
    }

  } catch (err) {
    showMsg("Network error", true);
  }
}

// ================= VERIFY OTP =================
async function verifyOTP() {
  const otp = document.getElementById("otp").value.trim();

  if (!otp || otp.length !== 6) {
    showMsg("Enter 6-digit OTP", true);
    return;
  }

  try {
    showMsg("Verifying...");

    const res = await fetch(`${API}/verify-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        userOtp: otp,
        vToken: tempVToken
      })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("token", data.token);

      showMsg("Login successful");

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 800);

    } else {
      showMsg("Invalid OTP", true);
    }

  } catch (err) {
    showMsg("Server error", true);
  }
}
</script>

</body>
</html>
