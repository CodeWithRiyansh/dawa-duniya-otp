<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dawa Duniya | OTP Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#0f172a;
}

/* ===== Animated Background ===== */
.bg{
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle at 20% 20%, #00ffcc33, transparent 30%),
                radial-gradient(circle at 80% 30%, #3b82f633, transparent 30%),
                radial-gradient(circle at 50% 80%, #a855f733, transparent 30%);
    animation: move 10s linear infinite;
}

@keyframes move{
    0%{transform:translate(0,0);}
    50%{transform:translate(-50px,-50px);}
    100%{transform:translate(0,0);}
}

/* ===== Card ===== */
.card{
    position:relative;
    width:420px;
    padding:40px;
    border-radius:22px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    font-size:28px;
    margin-bottom:5px;
}

.sub{
    font-size:13px;
    opacity:0.7;
    margin-bottom:25px;
}

/* Inputs */
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.06);
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#00ffcc;
    transform:scale(1.02);
}

/* Buttons */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.primary{
    background:linear-gradient(135deg,#00ffcc,#00b3a4);
    color:#000;
}

.primary:hover{transform:translateY(-2px);}
.secondary{
    background:linear-gradient(135deg,#3b82f6,#1d4ed8);
    color:white;
}

/* OTP box */
.hidden{display:none;}

#msg{
    margin-top:15px;
    font-size:13px;
    opacity:0.9;
}

/* toast style */
.toast{
    margin-top:10px;
    font-size:13px;
    color:#00ffcc;
    min-height:20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">
    <h2>Dawa Duniya</h2>
    <div class="sub">Aapki sehat ka sathi ❤️</div>

    <!-- EMAIL -->
    <div id="emailSection">
        <input type="email" id="email" placeholder="Enter Email Address"/>
        <button class="primary" onclick="sendOTP()">Send OTP</button>
    </div>

    <!-- OTP -->
    <div id="otpSection" class="hidden">
        <input type="text" id="otp" placeholder="Enter 6 digit OTP"/>
        <button class="secondary" onclick="verifyOTP()">Verify OTP</button>
    </div>

    <div id="msg" class="toast"></div>
</div>

<script>
const API =
  window.location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://dawa-duniya-otp.vercel.app";

let tempVToken = "";

// message handler
function show(msg){
    document.getElementById("msg").innerText = msg;
}

async function sendOTP(){
    const email = document.getElementById("email").value.trim();

    if(!email){
        show("Please enter email");
        return;
    }

    show("Sending OTP...");

    const res = await fetch(`${API}/send-otp`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email})
    });

    const data = await res.json();

    if(data.success){
        tempVToken = data.vToken;

        show("OTP sent successfully to your email ✉️");

        setTimeout(()=>{
            show("We have sent OTP to your entered email ID");
        },1500);

        document.getElementById("emailSection").classList.add("hidden");
        document.getElementById("otpSection").classList.remove("hidden");
    } else {
        show(data.message || "Failed to send OTP");
    }
}

async function verifyOTP(){
    const otp = document.getElementById("otp").value.trim();

    if(otp.length !== 6){
        show("Enter valid 6-digit OTP");
        return;
    }

    show("Verifying...");

    const res = await fetch(`${API}/verify-otp`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            userOtp:otp,
            vToken:tempVToken
        })
    });

    const data = await res.json();

    if(data.success){
        localStorage.setItem("dawaToken", data.token);
        show("Login successful 🚀");

        setTimeout(()=>{
            window.location.href = "dashboard.html";
        },1000);
    } else {
        show("Invalid OTP");
    }
}
</script>

</body>
</html>
